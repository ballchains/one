<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Accessing...</title>

<style>

body{
background:black;
color:#00ff00;
font-family:monospace;
font-size:clamp(14px,2.5vw,18px);
padding:40px;
margin:0;
}

#terminal{
max-width:700px;
}

#cursor{
display:inline-block;
width:10px;
background:#00ff00;
margin-left:5px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}

#infoPanel{
position:fixed;
right:40px;
top:40px;
color:#00ff00;
font-family:monospace;
font-size:16px;
line-height:1.6;
text-align:left;
}

/* MOBILE FIX */

@media (max-width:700px){

body{
padding:20px;
}

#infoPanel{
position:static;
margin-bottom:30px;
}

#terminal{
max-width:100%;
}

}

</style>
</head>

<body>

<div id="infoPanel">

SYSTEM STATUS
-------------
Device: <span id="device"></span><br>
Browser: <span id="browser"></span><br>
Time: <span id="time"></span>

</div>

<div id="terminal"></div><span id="cursor"></span>

<script>

const lines = [

"Initializing request...",
"",
"QR code detected.",
"Resolving link...",
"",
"Connection established.",
"Secure channel verified.",
"",
"Client device recognized.",
"Browser session opened.",
"",
"Cookies logged.",
"Session token generated.",
"",
"Visitor record created.",
"Timestamp stored.",
"",
"Status: OK",
"Awaiting further input..."

];

let line = 0;
let char = 0;
const speed = 35;
const terminal = document.getElementById("terminal");

function type(){

if(line < lines.length){

if(char < lines[line].length){

terminal.innerHTML += lines[line].charAt(char);
char++;
setTimeout(type, speed);

}else{

terminal.innerHTML += "<br>";
line++;
char = 0;
setTimeout(type, 300);

}

}

}

type();

/* system info panel */

document.getElementById("device").innerText =
navigator.platform;

document.getElementById("browser").innerText =
navigator.userAgent.split(" ").slice(-1)[0];

document.getElementById("time").innerText =
new Date().toLocaleTimeString();

</script>

</body>
</html>
